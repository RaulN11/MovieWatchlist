<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Your Profile</title>
  <link rel="stylesheet" href="/static/css/common.css">
  <link rel="stylesheet" href="/static/css/profile.css">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>
<body>
<div class="top-container">
  <a href="/homepage">
    <p><span class="first-word">Seen</span><span class="second-word">It</span></p>
  </a>
  <div class="left-side">
    <div class="nav-links">
      <a href="/watched/all">DIARY</a>
      <a href="/watchlist">WATCHLIST</a>
      <a href="/chat">INBOX</a>
      <a href="/recommendations">RECOMMENDATIONS</a>
    </div>
    <input class="top-nav" type="text" placeholder="Search here...">
    <button class="search-button">
      <i class="fa-solid fa-magnifying-glass" style="color: #838f9a;"></i>
    </button>
  </div>
</div>
<div class="profile-body">
  <div class="hero-section">
    <div class="hero-background"></div>
    <div class="profile-details">
      <button th:if="${client.id==authenticatedClient.id}" class="edit-profile-btn" onclick="openEditModal()">
        <i class="fa-solid fa-pen" style="color: white;"></i>
      </button>
      <img id="profilePicture"
           th:src="${client.profilePicture}"
           alt="profile pic"
           class="profile-picture"
           onerror="this.onerror=null; this.src='https://cdn.pixabay.com/photo/2015/10/05/22/37/blank-profile-picture-973460_640.png';">
      <p class="username" th:text="${client.username}"></p>
      <p class="bio" id="bioText" th:text="${client.bio}">.</p>
      <i th:if="${client.city!=null || client.country!=null}" class="fa-solid fa-location-dot" style="color: #710a42;">
        <span class="detail" id="locationText" th:text="${client.city + ', ' + client.country}"></span>
      </i>
      <i th:if="${client.instagram!=null}" class="fa-brands fa-instagram" style="color: #710a42;">
        <span class="detail" th:text="${client.instagram}"></span>
      </i>
      <i class="fa-solid fa-calendar" style="color: #710a42;">
        <span class="detail" th:text="${#temporals.day(client.joinedDate)}"></span>
        <span class="detail" th:text="${#temporals.monthNameShort(client.joinedDate)}"></span>
        <span class="detail" th:text="${#temporals.year(client.joinedDate)}"></span>
      </i>
    </div>
    <div class="follow-section">
      <button th:if="${client.id!=authenticatedClient.id}"
              class="follow-button"
              th:text="${authenticatedClient.following.contains(client.username) ? 'Following' : 'Follow'}"
              th:style="${authenticatedClient.following.contains(client.username) ? 'background: #710a42; border-color: #710a42; color: white;' : ''}">
        Follow
      </button>
      <div class="follow-stats">
        <div class="follow-item">
          <span th:text="${client.followers.size()}" class="follow-number"></span>
          <span class="follow-label">Followers</span>
        </div>
        <div class="follow-divider"></div>
        <div class="follow-item">
          <span th:text="${client.following.size()}" class="follow-number"></span>
          <span class="follow-label">Following</span>
        </div>
      </div>
    </div>

  </div>
  <div class="favourite-movies">
    <p class="title">Your <span class="pink">favourite</span> movies</p>
    <div class="movies">
      <img src="https://m.media-amazon.com/images/M/MV5BNGEwYjgwOGQtYjg5ZS00Njc1LTk2ZGEtM2QwZWQ2NjdhZTE5XkEyXkFqcGc@._V1_FMjpg_UX1000_.jpg" id="1st" class="movie">
      <img src="https://m.media-amazon.com/images/M/MV5BMTgzMTEwZjQtMjI2NS00NDEwLWFjNWEtNTNlNzdhODBhMDE0XkEyXkFqcGc@._V1_FMjpg_UX1000_.jpg" id="2nd" class="movie">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTcyJYd_sWzQdj87gwIiDRpi6JtzfY6-XLG-w&s" id="3rd" class="movie">
    </div>
  </div>
  <p class="title">Your <span class="pink">stats</span></p>
  <div class="stats">
    <div class="stat">
      <p th:text="${client.watchedMovies.size()}" class="pink"></p>
      <p class="stat-text">WATCHED</p>
    </div>
    <div class="stat">
      <p th:text="${client.likedMovies.size()}" class="pink"></p>
      <p class="stat-text">LIKED</p>
    </div>
    <div class="stat">
      <p th:text="${client.watchList.size()}" class="pink"></p>
      <p class="stat-text">TO WATCH</p>
    </div>
  </div>
  <div class="recent-activity">
    <p class="title">Recent <span class="pink">activity</span> </p>
    <div class="movies">
      <img th:each="movie : ${recentMovies}"
           th:src="${'https://image.tmdb.org/t/p/w780' + movie.posterPath}"
           th:alt="${movie.title}"
           class="movie"
           onerror="this.onerror=null; this.src='https://via.placeholder.com/150x225?text=No+Image';">
    </div>
  </div>
  <form action="/logout" method="post" class="logout-form">
    <button th:if="${client.id==authenticatedClient.id}" type="submit" class="logout-button">
      Log Out
    </button>
  </form>
</div>
<div id="edit-modal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <p class="modal-title">Edit your profile</p>
      <div class="close-btn" onclick="closeEditModal()">&times;</div>
    </div>
    <div class="modal-body">
      <form id="editProfileForm">
        <div class="form-group">
          <label for="bioInput">Bio</label>
          <textarea id="bioInput" placeholder="Tell us about yourself..." th:value="${client.bio}"></textarea>
        </div>
        <div class="location-group">
          <div class="form-group">
            <label for="cityInput">City</label>
            <input type="text" id="cityInput" placeholder="Your city" th:value="${client.city}">
          </div>
          <div class="form-group">
            <label for="countryInput">Country</label>
            <input type="text" id="countryInput" placeholder="Your country" th:value="${client.country}">
          </div>
        </div>
        <div class="form-group">
          <label for="profilePicInput">Profile Picture URL</label>
          <input type="text" id="profilePicInput" placeholder="https://image.url/picture.jpg" th:value="${client.profilePicture}">
        </div>
      </form>
    </div>
    <div class="modal-buttons">
      <button class="btn cancel-btn" type="button" onclick="closeEditModal()">Cancel</button>
      <button class="btn save-btn" type="button" onclick="saveProfile()">Save Changes</button>
    </div>
  </div>
</div>
<div id="top3-modal" class="modal1">
  <div class="top3-modal-content">
    <div class="modal-header">
      <p class="modal-title">Select a movie</p>
      <div class="close-btn" onclick="closeTop3Modal()">&times;</div>
    </div>
<!--    <div class="search-section">-->
<!--      <input class="top3-bar" placeholder="Search for a movie">-->
<!--      <i class="fa-solid fa-magnifying-glass"></i>-->
<!--    </div>-->
    <div class="movie-grid">
<!--      <img th:each="movie : ${authenticatedClient.watchedMovies}"-->
<!--           th:src="@{'https://image.tmdb.org/t/p/w780/' + ${movie.posterPath}}"-->
<!--           class="movie-poster" alt="poster">-->
      <img src="https://upload.wikimedia.org/wikipedia/ro/8/8d/Inception_%28film%29.jpg" alt="poster" class="movie-poster">
      <img src="https://upload.wikimedia.org/wikipedia/ro/8/8d/Inception_%28film%29.jpg" alt="poster" class="movie-poster">
      <img src="https://upload.wikimedia.org/wikipedia/ro/8/8d/Inception_%28film%29.jpg" alt="poster" class="movie-poster">
      <img src="https://upload.wikimedia.org/wikipedia/ro/8/8d/Inception_%28film%29.jpg" alt="poster" class="movie-poster">
      <img src="https://upload.wikimedia.org/wikipedia/ro/8/8d/Inception_%28film%29.jpg" alt="poster" class="movie-poster">
      <img src="https://upload.wikimedia.org/wikipedia/ro/8/8d/Inception_%28film%29.jpg" alt="poster" class="movie-poster">
      <img src="https://upload.wikimedia.org/wikipedia/ro/8/8d/Inception_%28film%29.jpg" alt="poster" class="movie-poster">
      <img src="https://upload.wikimedia.org/wikipedia/ro/8/8d/Inception_%28film%29.jpg" alt="poster" class="movie-poster">
      <img src="https://upload.wikimedia.org/wikipedia/ro/8/8d/Inception_%28film%29.jpg" alt="poster" class="movie-poster">
      <img src="https://upload.wikimedia.org/wikipedia/ro/8/8d/Inception_%28film%29.jpg" alt="poster" class="movie-poster">
      <img src="https://upload.wikimedia.org/wikipedia/ro/8/8d/Inception_%28film%29.jpg" alt="poster" class="movie-poster">

    </div>
    <div class="modal-buttons">
      <button class="btn cancel-btn" type="button" onclick="closeTop3Modal()">Cancel</button>
      <button class="btn save-btn" type="button" onclick="saveTop3()">Save Changes</button>
    </div>
  </div>
</div>
</body>
<script src="/static/js/profile.js" defer></script>
</html>
