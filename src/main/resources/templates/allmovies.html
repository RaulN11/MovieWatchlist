<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>All Movies</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h1>Movies List</h1>
    <div class="mb-3">
        <a th:href="@{/watched}" class="btn btn-primary me-2">Watched Movies</a>
        <a th:href="@{/watchlist}" class="btn btn-secondary me-2">Watchlist</a>
        <a th:href="@{/chat}" class="btn btn-info">Chat</a>
    </div>
    <table class="table table-dark table-striped">
        <thead>
        <tr>
            <th>Title</th>
            <th>Director</th>
            <th>Year</th>
            <th>Genre</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="movie : ${movies}">
            <td>
                <a th:href="@{'/details/' + ${movie.title}}" th:text="${movie.title}"></a>
            </td>
            <td th:text="${movie.director}"></td>
            <td th:text="${movie.year}"></td>
            <td th:text="${movie.genre}"></td>
        </tr>
        </tbody>
    </table>
    <nav aria-label="Page navigation" th:if="${totalPages > 0}">
        <ul class="pagination">
            <li class="page-item" th:classappend="${currentPage.number == 0}? 'disabled'">
                <a class="page-link" th:href="@{${currentPath}(page=${prevPage})}">Previous</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                th:classappend="${i == currentPage.number}? 'active'">
                <a class="page-link" th:href="@{${currentPath}(page=${i})}" th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${currentPage.number == totalPages - 1}? 'disabled'">
                <a class="page-link" th:href="@{${currentPath}(page=${nextPage})}">Next</a>
            </li>
        </ul>
    </nav>
</div>
</body>
</html>
