<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" >
    <title>Details</title>
    <link rel="stylesheet" href="/css/moviedetails.css">
    <link rel="stylesheet" href="/css/common.css">
    <link href="https://fonts.googleapis.com/css2?family=Monoton&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
</head>
<body>
<div class="top-container">
    <a href="/homepage">
        <p><span class="first-word">Seen</span><span class="second-word">It</span></p>
    </a>
    <div class="left-side">
        <div class="nav-links">
            <a href="/watched/all">DIARY</a>
            <a href="/watchlist">WATCHLIST</a>
            <a href="/chat">INBOX</a>
        </div>
        <input class="top-nav" type="text" placeholder="Search here...">
        <button class="search-button">
            <i class="fa-solid fa-magnifying-glass" style="color: #838f9a;"></i>
        </button>
        <div th:if="${client!=null}">
            <a th:href="'/profile/'+ ${client.id}">
                <img th:src="${client.profilePicture}"
                     alt="Profile Picture"
                     class="profile-pic"
                     onerror="this.onerror=null; this.src='https://cdn.pixabay.com/photo/2015/10/05/22/37/blank-profile-picture-973460_640.png';"
                >
            </a>
        </div>
    </div>
</div>
<div class="movie-details"
     th:attr="style='--backdrop-url: url(https://image.tmdb.org/t/p/original/' + ${movie.backdropPath} + ');'">
    <div class="poster-area">
        <img th:src="@{'https://image.tmdb.org/t/p/w780/' + ${movie.posterPath}}"
             alt="Movie Poster"
             class="movie-poster"
             onerror="this.onerror=null; this.src='https://www.nicepng.com/png/detail/311-3111609_clapperboard-movie-icon.png';">
        <div class="stats-overlay">
            <div class="stat-item">
                <i class="fa-solid fa-eye"></i>
                <span th:text="${movie.watchedCount}" class="stat-value"></span>
            </div>
            <div class="stat-item">
                <i class="fa-solid fa-heart"></i>
                <span th:text="${movie.likedCount}" class="stat-value"></span>
            </div>
            <div class="stat-item">
                <i class="fa-solid fa-star"></i>
                <span th:text="${#numbers.formatDecimal(movie.ratingSum/movie.ratingCount,1,2)}" class="stat-value"></span>
            </div>
        </div>
    </div>
    <div class="text-details">
        <p class="title">
            <span th:text="${movie.title}"></span>
            <span class="year" th:text="'(' + ${movie.year} + ')'"></span>
        </p>

        <p class="director" th:text="${movie.director}"></p>
        <p class="details">
            &#x2022; <span th:text="${movie.genre}" class="detail"></span>
            &#x2022; <span th:text="${movie.runtime}" class="detail"></span>
        </p>
        <div th:if="${client!=null}"class="buttons-grid">
            <div class="button-background"
                 id="like-button"
                 th:data-tid="${movie.tid}"
                 th:data-title="${movie.title}"
                 th:attr="data-state=${liked.contains(movie) ? 'active' : 'inactive'}">
                <i class="fa-solid fa-heart"
                   th:style="${liked.contains(movie)} ? 'color:#710a42;' : 'color:white;'"></i>
            </div>
            <div class="button-background"
                 id="watched-button"
                 th:data-tid="${movie.tid}"
                 th:data-title="${movie.title}"
                 th:attr="data-state=${watched.contains(movie) ? 'active' : 'inactive'}">
                <i class="fa-solid fa-circle-check"
                   th:style="${watched.contains(movie)} ? 'color:#710a42;' : 'color:white;'"></i>
            </div>
            <div class="button-background"
                 id="watchlist-button"
                 th:data-tid="${movie.tid}"
                 th:data-title="${movie.title}"
                 th:attr="data-state=${watchlist.contains(movie) ? 'active' : 'inactive'}">
                <i class="fa-solid fa-eye"
                   th:style="${watchlist.contains(movie)} ? 'color:#710a42;' : 'color:white;'"></i>
            </div>
        </div>
    </div>
</div>
<div class="footer-section">
    <h2 class="section-title">Overview</h2>
    <p th:text="${movie.overview}" class="overview-text"></p>
    <h2 class="section-title">Cast</h2>
    <hr class="separator">
        <div class="cast-list">
            <div class="actor" th:each="actor : ${movie.actors}">
                <a th:href="'/moviesbyactor/'+${actor.getFullName()}">
                    <img th:src="@{'https://image.tmdb.org/t/p/w780/' + ${actor.picture}}"
                         alt="Actor Poster"
                         class="actor-poster"
                         onerror="this.onerror=null; this.src='https://cdn.pixabay.com/photo/2015/10/05/22/37/blank-profile-picture-973460_640.png';"
                    >
                </a>
                <p class="actor-name" th:text="${actor.fullName}">Actor Name</p>
            </div>
        </div>
    <h2 class="section-title">Reviews</h2>
    <hr class="separator">
    <div class="reviews">
        <div class="review-card" th:each="review:${reviews}">
            <img th:src="${review.authorPicture}"
                 alt="user pic"
                 class="review-pic"
                 onerror="this.onerror=null; this.src='https://cdn.pixabay.com/photo/2015/10/05/22/37/blank-profile-picture-973460_640.png';"
            >
            <div class="review-text">
                <p class="review-author">Review by <strong th:text="${review.author}"></strong></p>
                <p class="review-grade"><span th:text="${review.rating}"></span>/10.0</p>
                <p class="review-comment" th:text="${review.comment}"></p>
            </div>
        </div>
    </div>
</div>
<div id="review-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Enter your <span class="pink">review</span></h2>
                <div class="close-btn">&times;</div>
            </div>
            <div class="review-body">
                <img th:src="@{'https://image.tmdb.org/t/p/w780/' + ${movie.posterPath}}"
                     alt="Movie Poster"
                     class="review-poster"
                     onerror="this.onerror=null; this.src='https://www.nicepng.com/png/detail/311-3111609_clapperboard-movie-icon.png';"
                >
                <div class="review_details">
                    <div class="modal-names">
                        <p th:text="${movie.title}" class="modal-title"></p>
                        <p th:text="${movie.year}" class="modal-year"></p>
                    </div>
                    <textarea id="review-area" class="review-textbox" rows="6" placeholder=" Add a review..."></textarea>
                    <textarea id="rating-area" class="rating"  rows="1" placeholder=" Rating"></textarea>
                    <div class="review-buttons">
                        <button id="cancel" class="cancel-button">Cancel</button>
                        <button id="save" class="save-button">Save</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
<script src="/js/moviedetails.js"></script>
</html>
