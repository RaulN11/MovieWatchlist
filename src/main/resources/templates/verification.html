<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Email Verification</title>
  <link rel="stylesheet" href="/css/login.css">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Monoton&display=swap" rel="stylesheet">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      margin: 0;
      padding: 20px;
    }

    .verification-container {
      width: 100%;
      max-width: 500px;
    }

    .verification-box {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      padding: 50px 40px;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    .verification-box h1 {
      margin-bottom: 20px;
      color: #fff;
      font-size: 32px;
      font-family: 'Oswald', sans-serif;
    }

    .verification-box p {
      margin-bottom: 30px;
      color: rgba(255, 255, 255, 0.9);
      line-height: 1.6;
      font-size: 16px;
    }

    .success-icon {
      font-size: 80px;
      color: #4CAF50;
      margin-bottom: 20px;
      animation: scaleIn 0.5s ease-out;
    }

    .error-icon {
      font-size: 80px;
      color: #f44336;
      margin-bottom: 20px;
      animation: scaleIn 0.5s ease-out;
    }

    @keyframes scaleIn {
      from {
        transform: scale(0);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .btn-container {
      margin-top: 30px;
    }

    .btn {
      display: inline-block;
      padding: 14px 35px;
      background: linear-gradient(45deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-decoration: none;
      border-radius: 25px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      font-family: 'Oswald', sans-serif;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.5);
      border-color: rgba(255, 255, 255, 0.5);
    }

    .title {
      text-align: center;
      font-size: 48px;
      margin-bottom: 10px;
    }

    .first-word {
      font-family: 'Monoton', cursive;
      color: #fff;
    }

    .second-word {
      font-family: 'Monoton', cursive;
      color: #ffd700;
    }
  </style>
</head>
<body>
<div class="verification-container">
  <p class="title"><span class="first-word">Seen</span><span class="second-word">It</span></p>

  <div class="verification-box">
    <div th:if="${success}">
      <div class="success-icon">✓</div>
      <h1>Email Verified!</h1>
      <p>Your email has been successfully verified. You can now log in to your account and start tracking your movies.</p>
      <div class="btn-container">
        <a href="/login" class="btn">Go to Login</a>
      </div>
    </div>

    <div th:if="${error}">
      <div class="error-icon">✗</div>
      <h1>Verification Failed</h1>
      <p th:text="${errorMessage}">The verification link is invalid or has expired.</p>
      <div class="btn-container">
        <a href="/signup" class="btn">Sign Up Again</a>
      </div>
    </div>
  </div>
</div>
</body>
</html>
