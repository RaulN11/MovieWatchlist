<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Movie Chat</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.2/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f5f5f5;
        }
        .chat-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .chat-header {
            background: #007bff;
            color: white;
            padding: 15px;
            text-align: center;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .users-section {
            border-bottom: 1px solid #eee;
            padding: 15px;
        }
        .user-select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        .messages-container {
            height: 400px;
            overflow-y: auto;
            padding: 15px;
            background: #fafafa;
        }
        .message {
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 10px;
            max-width: 70%;
            word-wrap: break-word;
        }
        .message.sent {
            background: #007bff;
            color: white;
            margin-left: auto;
            text-align: right;
        }
        .message.received {
            background: #e9ecef;
            color: #333;
            margin-right: auto;
        }
        .message-sender {
            font-size: 12px;
            opacity: 0.8;
            margin-bottom: 5px;
        }
        .message-input {
            display: flex;
            padding: 15px;
            border-top: 1px solid #eee;
        }
        .message-input input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 25px;
            margin-right: 10px;
            font-size: 16px;
        }
        .message-input button {
            padding: 12px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
        }
        .message-input button:hover {
            background: #0056b3;
        }
        .status {
            padding: 10px;
            text-align: center;
            font-size: 14px;
            color: #666;
        }
        .connected {
            color: green;
        }
        .disconnected {
            color: red;
        }
        .back-button {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            text-decoration: none;
            cursor: pointer;
        }
        .back-button:hover {
            background: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <a href="/allmovies" class="back-button">← Back to Movies</a>
        <h2>Movie Chat System</h2>
        <span th:text="'Welcome, ' + ${currentUser}"></span>
    </div>

    <div class="status" id="connectionStatus">
        <span class="disconnected">Connecting...</span>
    </div>

    <div class="users-section">
        <label for="userSelect">Select user to chat with:</label>
        <select id="userSelect" class="user-select">
            <option value="">Choose a user...</option>
        </select>
    </div>

    <div class="messages-container" id="messagesContainer">
        <div style="text-align: center; color: #666; margin-top: 50px;">
            Select a user to start chatting
        </div>
    </div>

    <div class="message-input">
        <input type="text" id="messageInput" placeholder="Type your message..." disabled/>
        <button onclick="sendMessage()" id="sendButton" disabled>Send</button>
    </div>
</div>

<script>
    let stompClient = null;
    let currentUser = /*[[${currentUser}]]*/ 'defaultUser';
    let selectedUser = null;

    function connect() {
        const socket = new SockJS('/ws');
        stompClient = Stomp.over(socket);

        stompClient.connect({}, function(frame) {
            console.log('Connected: ' + frame);
            updateConnectionStatus(true);

            // Subscribe to personal message queue - this matches your ChatController
            stompClient.subscribe('/user/queue/messages', function(message) {
                console.log('Received message:', message.body);
                const chatNotification = JSON.parse(message.body);
                if (selectedUser === chatNotification.sender) {
                    displayMessage(chatNotification.sender, chatNotification.content, false);
                }
            });

            loadUsers();
        }, function(error) {
            console.log('Connection error: ' + error);
            updateConnectionStatus(false);
            setTimeout(connect, 5000);
        });
    }

    function updateConnectionStatus(connected) {
        const statusElement = document.getElementById('connectionStatus');
        statusElement.innerHTML = connected
            ? '<span class="connected">✓ Connected</span>'
            : '<span class="disconnected">✗ Disconnected - Retrying...</span>';
    }

    async function loadUsers() {
        try {
            const response = await fetch('/users');
            const users = await response.json();
            const userSelect = document.getElementById('userSelect');

            userSelect.innerHTML = '<option value="">Choose a user...</option>';

            users.forEach(username => {
                if (username !== currentUser) {
                    const option = document.createElement('option');
                    option.value = username;
                    option.textContent = username;
                    userSelect.appendChild(option);
                }
            });
        } catch (error) {
            console.error('Error loading users:', error);
        }
    }

    function onUserSelect() {
        const userSelect = document.getElementById('userSelect');
        selectedUser = userSelect.value;

        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');

        if (selectedUser) {
            messageInput.disabled = false;
            sendButton.disabled = false;
            messageInput.focus();
            loadChatHistory();
        } else {
            messageInput.disabled = true;
            sendButton.disabled = true;
            document.getElementById('messagesContainer').innerHTML =
                '<div style="text-align: center; color: #666; margin-top: 50px;">Select a user to start chatting</div>';
        }
    }

    async function loadChatHistory() {
        if (!selectedUser) return;

        try {
            const response = await fetch(`/messages/${currentUser}/${selectedUser}`);
            const messages = await response.json();

            const messagesContainer = document.getElementById('messagesContainer');
            messagesContainer.innerHTML = '';

            if (messages.length === 0) {
                messagesContainer.innerHTML = '<div style="text-align: center; color: #666;">No messages yet. Start the conversation!</div>';
            } else {
                messages.forEach(message => {
                    displayMessage(message.sender, message.content, message.sender === currentUser);
                });
            }

            scrollToBottom();
        } catch (error) {
            console.error('Error loading chat history:', error);
        }
    }

    function displayMessage(sender, content, isSent) {
        const messagesContainer = document.getElementById('messagesContainer');

        // Remove the "no messages" placeholder if it exists
        if (messagesContainer.innerHTML.includes('No messages yet') || messagesContainer.innerHTML.includes('Select a user')) {
            messagesContainer.innerHTML = '';
        }

        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${isSent ? 'sent' : 'received'}`;

        const senderDiv = document.createElement('div');
        senderDiv.className = 'message-sender';
        senderDiv.textContent = isSent ? 'You' : sender;

        const contentDiv = document.createElement('div');
        contentDiv.textContent = content;

        messageDiv.appendChild(senderDiv);
        messageDiv.appendChild(contentDiv);
        messagesContainer.appendChild(messageDiv);

        scrollToBottom();
    }

    function sendMessage() {
        const messageInput = document.getElementById('messageInput');
        const content = messageInput.value.trim();

        if (!content || !selectedUser || !stompClient) return;

        // This matches your ChatController @MessageMapping("/chat")
        const chatMessage = {
            sender: currentUser,
            receiver: selectedUser,
            content: content,
            timestamp: new Date()
        };

        console.log('Sending message:', chatMessage);
        stompClient.send('/app/chat', {}, JSON.stringify(chatMessage));

        displayMessage(currentUser, content, true);
        messageInput.value = '';
    }

    function scrollToBottom() {
        const messagesContainer = document.getElementById('messagesContainer');
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    // Event listeners
    document.getElementById('userSelect').addEventListener('change', onUserSelect);

    document.getElementById('messageInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            sendMessage();
        }
    });

    // Initialize connection
    connect();
</script>
</body>
</html>
